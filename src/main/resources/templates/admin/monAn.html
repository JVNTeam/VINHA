<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý món ăn - Vị Nhà Admin</title>

    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/quanLyMonAn.css}">
</head>
<body>

<div class="admin-wrapper">

    <!-- ADMIN SIDEBAR -->
    <aside class="admin-sidebar">
        <div class="sidebar-brand">
            <span class="brand-text">Vị Nhà</span>
        </div>

        <nav class="admin-nav">
            <a th:href="@{/admin/dashboard}" class="nav-item">
                <i class="fa-solid fa-grid-2"></i> Dashboard
            </a>
            <a th:href="@{/admin/mon-an}" class="nav-item active">
                <i class="fa-solid fa-utensils"></i> Quản lý món ăn
            </a>
            <a th:href="@{/admin/hinh-anh}" class="nav-item">
                <i class="fa-regular fa-image"></i> Quản lý hình ảnh
            </a>
            <a th:href="@{/admin/danh-muc}" class="nav-item">
                <i class="fa-solid fa-layer-group"></i> Danh mục
            </a>
            <a th:href="@{/admin/giam-gia}" class="nav-item">
                <i class="fa-solid fa-ticket"></i> Mã giảm giá
            </a>
            <a th:href="@{/admin/nguoi-dung}" class="nav-item">
                <i class="fa-solid fa-users"></i> Người dùng
            </a>
            <a th:href="@{/admin/don-hang}" class="nav-item">
                <i class="fa-solid fa-cart-shopping"></i> Đơn hàng
            </a>
            <a th:href="@{/admin/thanh-toan}" class="nav-item">
                <i class="fa-solid fa-wallet"></i> Thanh toán
            </a>
            <a th:href="@{/admin/thong-ke}" class="nav-item">
                <i class="fa-solid fa-chart-simple"></i> Thống kê
            </a>
        </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="admin-main">

        <!-- Header Page Title & Top Action -->
        <div class="page-header">
            <h1 class="page-title">Quản lý món ăn</h1>
            <a th:href="@{/admin/mon-an/them}" class="btn-add-product">
                <i class="fa-solid fa-plus"></i> Thêm món ăn mới
            </a>
        </div>

        <!-- Filter Card -->
        <div class="filter-card">
            <form th:action="@{/admin/mon-an}" method="get" class="filter-form">

                <div class="filter-group group-search">
                    <label class="filter-label">Tìm kiếm</label>
                    <input type="text" name="keyword" th:value="${keyword}"
                           class="filter-input" placeholder="Tên món ăn...">
                </div>

                <div class="filter-group">
                    <label class="filter-label">Danh mục</label>
                    <select name="category" class="filter-select">
                        <option value="">Tất cả danh mục</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat}"
                                th:text="${cat}"
                                th:selected="${cat == selectedCategory}"></option>
                    </select>
                </div>

                <div class="filter-group">
                    <label class="filter-label">Trạng thái</label>
                    <select name="status" class="filter-select">
                        <option value="">Tất cả trạng thái</option>
                        <option value="ACTIVE" th:selected="${selectedStatus == 'ACTIVE'}">Đang bán</option>
                        <option value="OUT_OF_STOCK" th:selected="${selectedStatus == 'OUT_OF_STOCK'}">Hết hàng</option>
                        <option value="STOPPED" th:selected="${selectedStatus == 'STOPPED'}">Ngừng bán</option>
                    </select>
                </div>

                <div class="filter-actions">
                    <button type="submit" class="btn-search">Tìm kiếm</button>
                    <a th:href="@{/admin/mon-an}" class="btn-reset" title="Đặt lại">
                        <i class="fa-solid fa-rotate-right"></i>
                    </a>
                </div>

            </form>
        </div>

        <!-- Data Table Card -->
        <div class="table-card">
            <div class="table-responsive">
                <table class="admin-table">
                    <thead>
                    <tr>
                        <th width="60">STT</th>
                        <th width="100">HÌNH ẢNH</th>
                        <th>TÊN MÓN</th>
                        <th>DANH MỤC</th>
                        <th>GIÁ (VNĐ)</th>
                        <th>SỐ LƯỢNG</th>
                        <th>ĐÃ BÁN</th>
                        <th>TRẠNG THÁI</th>
                        <th width="120" style="text-align: center;">THAO TÁC</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="p : ${products}">
                        <td class="col-stt" th:text="${p.stt}">01</td>
                        <td>
                            <img th:src="${p.image}" alt="Món ăn" class="product-img">
                        </td>
                        <td class="col-name" th:text="${p.name}">Cơm Sườn Nướng</td>
                        <td class="col-category" th:text="${p.category}">Cơm Sườn</td>
                        <td class="col-price" th:text="${p.price}">45.000đ</td>
                        <td th:text="${p.stock}">120</td>
                        <td th:text="${p.sold}">1.254</td>
                        <td>
                            <span th:class="'badge badge-' + ${p.statusCode}"
                                  th:text="${p.statusText}">Đang bán</span>
                        </td>
                        <td>
                            <!-- ĐÃ SỬA CÚ PHÁP TRUYỀN DATA AN TOÀN -->
                            <div class="action-buttons">
                                <button class="btn-icon" title="Xem"
                                        th:data-id="${p.stt}"
                                        onclick="viewProduct(this.getAttribute('data-id'))">
                                    <i class="fa-regular fa-eye"></i>
                                </button>
                                <button class="btn-icon" title="Sửa"
                                        th:data-id="${p.stt}"
                                        onclick="editProduct(this.getAttribute('data-id'))">
                                    <i class="fa-regular fa-pen-to-square"></i>
                                </button>
                                <button class="btn-icon" title="Xóa"
                                        th:data-id="${p.stt}"
                                        onclick="deleteProduct(this.getAttribute('data-id'))">
                                    <i class="fa-regular fa-trash-can"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Table Pagination -->
            <div class="table-pagination">
                <button class="page-btn"><i class="fa-solid fa-chevron-left"></i></button>
                <button class="page-btn active">1</button>
                <button class="page-btn">2</button>
                <button class="page-btn">3</button>
                <span class="page-dots">...</span>
                <button class="page-btn">15</button>
                <button class="page-btn"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>

    </main>

</div>

<!-- Custom JS -->
<script th:src="@{/js/quanLyMonAn.js}"></script>
</body>
</html>
