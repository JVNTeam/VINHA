<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thực đơn - Vị Nhà</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
    <link rel="stylesheet" th:href="@{/css/header.css}" />
    <link rel="stylesheet" th:href="@{/css/thucDon.css}" />
    <link rel="stylesheet" th:href="@{/css/footer.css}" />
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<main style="margin-top: 90px;">

    <!-- ================= MENU ================= -->

        <div class="container">
            <div class="page-title">
                <h1>Danh sách món ngon</h1>

                <p>
                    Khám phá hương vị quê nhà qua từng món cơm được chuẩn bị tỉ mỉ từ
                    những nguyên liệu tươi ngon nhất trong ngày.
                </p>
            </div>

            <!-- ================= FILTER ================= -->

            <div class="filter-box">
                <div class="row g-3">
                    <div class="col-lg-6">
                        <div class="search-food">
                            <i class="fa-solid fa-magnifying-glass"></i>

                            <input type="text" placeholder="Tìm kiếm món ăn..." />
                        </div>
                    </div>

                    <div class="col-lg-6">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label> DANH MỤC: </label>

                                <select class="form-select">
                                    <option>Tất cả</option>

                                    <option>Cơm</option>

                                    <option>Canh</option>

                                    <option>Món mặn</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label> GIÁ </label>

                                <input type="number" class="form-control" />
                            </div>

                            <div class="col-md-6">
                                <label> SẮP XẾP: </label>

                                <select class="form-select">
                                    <option>Bán chạy nhất</option>

                                    <option>Giá thấp</option>

                                    <option>Giá cao</option>

                                    <option>Mới nhất</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label> SAO </label>

                                <select class="form-select">
                                    <option>⭐ 5</option>

                                    <option>⭐ 4+</option>

                                    <option>⭐ 3+</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ================= PRODUCT GRID ================= -->

            <div class="row g-4 mt-3">
                <!-- CARD BẮT ĐẦU TỪ ĐÂY -->
                <!-- ================= CARD ================= -->

                <div class="col-lg-3 col-md-6">
                    <div class="food-card">
                        <!-- Rating -->
                        <span class="rating"> ⭐ 4.9 </span>

                        <!-- Best Seller -->
                        <!--
                              <span class="best-seller">
                                  BÁN CHẠY
                              </span>
                              -->

                        <!-- Sold Out -->
                        <!--
                              <div class="sold-out">
                                  HẾT HÀNG
                              </div>
                              -->

                        <img th:src="@{/images/foods/comTamSuonBiCha2.webp}" alt="" />

                        <div class="food-content">
                            <h3>Cơm Sườn Nướng Muối Ớt</h3>

                            <p>
                                Sườn heo nạc được tẩm ướp sốt muối ớt cay nồng, nướng than
                                hoa...
                            </p>

                            <div class="food-bottom">
                                <span class="price"> 55.000đ </span>

                                <span class="sold"> Đã bán 1.2k </span>
                            </div>

                            <div class="food-btn">
                                <a href="/chiTietMonAn" class="detail-btn"> Chi tiết </a>

                                <button>
                                    <i class="fa-solid fa-cart-plus"></i>

                                    Thêm
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- ================= PAGINATION ================= -->

                <nav class="menu-pagination">
                    <button class="page-btn">
                        <i class="fa-solid fa-chevron-left"></i>
                        Trang trước
                    </button>

                    <button class="page-number active">1</button>

                    <button class="page-number">2</button>

                    <button class="page-number">3</button>

                    <span>...</span>

                    <button class="page-number">12</button>

                    <button class="page-btn">
                        Trang sau

                        <i class="fa-solid fa-chevron-right"></i>
                    </button>
                </nav>
            </div>
        </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/thucdon.js}"></script>
</body>
</html>
